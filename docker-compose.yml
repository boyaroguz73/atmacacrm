services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: whatsapp_crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_secret_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d whatsapp_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Özel imaj: sunucuda önce `docker login` (Docker Hub kullanıcı + PAT), sonra `docker compose pull waha`
  waha:
    mem_limit: 4g
    mem_reservation: 3g
    image: devlikeapro/waha-plus:latest
    container_name: crm-waha
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      # GOWS history sync ayarlari (yalnizca engine=GOWS iken etkindir)
      WAHA_GOWS_DEVICE_REQUIRE_FULL_SYNC: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_FULL_SYNC_DAYS_LIMIT: "365"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_FULL_SYNC_SIZE_MB_LIMIT: "2048"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_STORAGE_QUOTA_MB: "2048"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_INLINE_INITIAL_PAYLOAD_IN_E2EE_MSG: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_RECENT_SYNC_DAYS_LIMIT: "30"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_INITIAL_SYNC_MAX_MESSAGES_PER_CHAT: "1000"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_THUMBNAIL_SYNC_DAYS_LIMIT: "90"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_CALL_LOG_HISTORY: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_BOT_USER_AGENT_CHAT_HISTORY: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_CAG_REACTIONS_AND_POLLS: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_BIZ_HOSTED_MSG: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_RECENT_SYNC_CHUNK_MESSAGE_COUNT_TUNING: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_HOSTED_GROUP_MSG: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_FBID_BOT_CHAT_HISTORY: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_ADD_ON_HISTORY_SYNC_MIGRATION: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_MESSAGE_ASSOCIATION: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_GROUP_HISTORY: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_ON_DEMAND_READY: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_COMPLETE_ON_DEMAND_READY: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_GUEST_CHAT: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_MANUS_HISTORY: "true"
      WAHA_GOWS_DEVICE_HISTORY_SYNC_SUPPORT_HATCH_HISTORY: "true"
      WAHA_DASHBOARD_ENABLED: "true"
      WHATSAPP_RESTART_ALL_SESSIONS: "false"
      WAHA_LOG_LEVEL: info
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WAHA_NO_API_KEY: ${WAHA_NO_API_KEY:-true}
      # Panel: https://waha.devlike.pro/docs/how-to/dashboard/ (Plus’ta geçerli)
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:-admin}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:-}
      WAHA_DASHBOARD_NO_PASSWORD: "${WAHA_DASHBOARD_NO_PASSWORD:-false}"
    volumes:
      - waha_data:/app/.sessions

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://crm_user:${POSTGRES_PASSWORD:-crm_secret_password}@postgres:5432/whatsapp_crm
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      WAHA_API_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WAHA_WEBHOOK_URL: ${WAHA_WEBHOOK_URL:-http://backend:4000/api/waha/webhook}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: "4000"
      SYNC_CHAT_LIMIT: ${SYNC_CHAT_LIMIT:-99999}
      SYNC_MESSAGE_LIMIT: ${SYNC_MESSAGE_LIMIT:-99999}
      # WAHA istek süresi; medya ağırsa artırın
      SYNC_TIMEOUT_MS: ${SYNC_TIMEOUT_MS:-120000}
      # Toplu senkron: false = medya indirmeden liste (hızlı, daha az timeout). Medya için true.
      SYNC_DOWNLOAD_MEDIA: ${SYNC_DOWNLOAD_MEDIA:-false}
      # sync-all: true = veritabanı WAHA’dan yeniyse konuşmayı atla (hızlı, eksik mesaj riski)
      SYNC_SKIP_UP_TO_DATE: ${SYNC_SKIP_UP_TO_DATE:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@localhost}
      IYZICO_API_KEY: ${IYZICO_API_KEY:-}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY:-}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL:-https://sandbox-api.iyzipay.com}
      WAHA_WEBHOOK_SECRET: ${WAHA_WEBHOOK_SECRET:-}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      waha:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  waha_data:
    external: true
    name: atmaca-crm_waha_data
  backend_uploads:
